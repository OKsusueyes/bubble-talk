<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>픽셀 비눗방울 톡</title>
    <style>
        @font-face {
            font-family: 'DungGeunMo';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'DungGeunMo', sans-serif; transition: background-color 0s; }
        
        .bg-playground { background-color: #fce4ec; }
        .bg-rooftop { background-color: #e8eaf6; }
        .bg-school { background-color: #e8f5e9; }
        .bg-park { background-color: #e0f7fa; }
        .bg-night {
            background-color: #0b101e;
            background-image: 
                linear-gradient(white 2px, transparent 2px),
                linear-gradient(90deg, white 2px, transparent 2px),
                linear-gradient(rgba(255,255,255,0.5) 2px, transparent 2px),
                linear-gradient(90deg, rgba(255,255,255,0.5) 2px, transparent 2px);
            background-size: 150px 150px, 150px 150px, 80px 80px, 80px 80px;
            background-position: 10px 10px, 10px 10px, 40px 40px, 40px 40px;
            color: white;
        }

        .ui-container { position: absolute; top: 20px; left: 20px; z-index: 10; display: flex; flex-direction: column; gap: 8px; }
        .select-group { display: flex; gap: 10px; }
        select { 
            padding: 8px; font-size: 1rem; font-family: 'DungGeunMo', sans-serif;
            border: 3px solid #000; border-radius: 0; outline: none; 
            background: #fff; box-shadow: 4px 4px 0px #000; cursor: pointer;
        }
        
        /* 🌟 안내 문구: 왼쪽 정렬 적용 */
        .instruction-text {
            font-size: 0.85rem; color: #000; background: #fff; border: 2px solid #000; 
            padding: 6px 10px; width: max-content; box-shadow: 2px 2px 0px #000; margin-top: 5px;
            text-align: left; line-height: 1.4;
        }

        /* 🌟 채팅창: 가로 폭 기준(box-sizing)을 입력창과 완벽 통일 */
        .chat-log { 
            box-sizing: border-box;
            position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 350px; 
            height: 105px; 
            background: rgba(255, 255, 255, 0.4); 
            border: 3px solid #000; border-radius: 0; box-shadow: 5px 5px 0px rgba(0,0,0,0.3);
            padding: 8px 10px; overflow-y: auto; z-index: 5; 
            display: flex; flex-direction: column; gap: 5px; 
        }
        
        .log-item { font-size: 0.8rem; color: #000; word-break: break-all; text-shadow: none; }
        
        /* 🌟 닉네임 배경색 하얀색(solid)으로 통일 */
        .log-nickname { font-weight: normal; color: #000; background: #ffffff; border: 1px solid #000; padding: 0 4px; margin-right: 5px; }
        
        .log-notice { color: #555; font-size: 0.75rem; background: rgba(238, 238, 238, 0.7); border: 1px dashed #aaa; padding: 3px; }
        .notice-icon { font-style: normal; }
        .notice-text { font-style: italic; }

        .notice-banner {
            position: absolute; top: 120px; left: 50%; transform: translateX(-50%);
            color: #fff; background: #000; border: 3px solid #fff; box-shadow: 4px 4px 0px #000;
            padding: 5px 15px; font-size: 1rem; z-index: 30; pointer-events: none; width: max-content; text-align: center;
        }

        /* 🌟 입력창 + 버튼: 가로 폭 완벽 매칭 및 버튼 추가 */
        .chat-container { 
            box-sizing: border-box;
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 350px; z-index: 10; 
            display: flex; gap: 5px;
        }
        input[type="text"] { 
            flex: 1; /* 남은 공간을 꽉 채움 */
            box-sizing: border-box; padding: 12px 15px; font-size: 1rem; font-family: 'DungGeunMo', sans-serif;
            border: 3px solid #000; border-radius: 0; box-shadow: 4px 4px 0px #000; outline: none; 
        }
        input[type="text"]:disabled { background-color: #ddd; color: #f00; border-color: #f00; }
        
        /* 🌟 후~💨 전송 버튼 디자인 */
        #sendBtn {
            font-family: 'DungGeunMo', sans-serif; font-size: 1rem; font-weight: bold;
            background: #ffffff; border: 3px solid #000; box-shadow: 4px 4px 0px #000; 
            padding: 0 10px; cursor: pointer; outline: none;
        }
        #sendBtn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }
        
        #wand { 
            position: absolute; width: 40px; height: 40px; 
            border: 4px solid #63B8FF; border-radius: 50%; 
            background: rgba(135, 206, 235, 0.2); 
            transform: translate(-50%, -50%); display: none; pointer-events: none; z-index: 5; 
        }
        #wand::after { 
            content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); 
            width: 6px; height: 40px; background-color: #63B8FF; border: none; 
        }
        
        /* 🌟 엔더 진주 느낌의 비트맵 원형 비눗방울 */
        .bubble { 
            position: absolute; 
            background-color: rgba(135, 206, 235, 0.4); 
            
            /* 마인크래프트 광택 텍스쳐 */
            background-image: 
                linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.8)),
                linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.8)),
                linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.8));
            background-size: 15% 15%, 15% 15%, 15% 15%; 
            background-position: 15% 15%, 30% 15%, 15% 30%; background-repeat: no-repeat;
            
            /* 검은 선 제거, 내부 픽셀 3D 음영 처리 */
            box-shadow: inset 0 0 0 4px rgba(100, 180, 230, 0.8), inset -6px -6px 0px rgba(100, 180, 230, 0.5); 
            
            /* 🌟 핵심! 픽셀 느낌으로 팔각형 모양으로 모서리 잘라내기 (Ender Pearl 스타일) */
            clip-path: polygon(
                20% 0%, 80% 0%, 
                100% 20%, 100% 80%, 
                80% 100%, 20% 100%, 
                0% 80%, 0% 20%
            );
            
            transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; 
        }
        
        /* 🌟 비눗방울 안의 닉네임 배경색도 하얀색 */
        .bubble-nickname { font-size: 0.8rem; color: #000; margin-bottom: 2px; background: #ffffff; padding: 0 4px; border: 1px solid rgba(100, 180, 230, 0.8); }
        .bubble-text { color: #000; font-size: 1rem; text-align: center; padding: 0 10px; word-break: break-all; text-shadow: 1px 1px 0px #fff; }
        
        @keyframes blowAway {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            85% { transform: translate(calc(-50% + var(--target-x) * 0.85), calc(-50% + var(--target-y) * 0.85)) scale(1.1); opacity: 1; }
            95% { transform: translate(calc(-50% + var(--target-x)), calc(-50% + var(--target-y))) scale(1.1); opacity: 0.5; }
            100% { transform: translate(calc(-50% + var(--target-x)), calc(-50% + var(--target-y))) scale(1.5); opacity: 0; }
        }

        @keyframes fadeOutAlert {
            0% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -30px); }
        }
    </style>
</head>
<body class="bg-playground" id="gameArea">

    <div id="wand"></div>
    <div class="ui-container">
        <div class="select-group">
            <select id="locationSelect">
                <option value="bg-playground">놀이터</option>
                <option value="bg-rooftop">옥상</option>
                <option value="bg-school">학교</option>
                <option value="bg-park">공원</option>
                <option value="bg-night">밤거리</option>
            </select>
            <select id="windSelect">
                <option value="clear">맑음</option>
                <option value="breeze">산들바람</option>
                <option value="cool">시원함</option>
                <option value="typhoon">태풍</option>
            </select>
        </div>
        <div class="instruction-text">꾹 누르면 나만의 비눗방울을 불 수 있어요!<br>대왕 비눗방울을 불어보세요!😗💨🫧</div>
    </div>
    
    <div id="chatLog" class="chat-log"></div>

    <div class="chat-container">
        <input type="text" id="chatInput" maxlength="20" placeholder="최대 20자 입력가능!" autocomplete="off">
        <button id="sendBtn">후~💨</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    
    <script>
        const socket = io();

        const gameArea = document.getElementById('gameArea');
        const locationSelect = document.getElementById('locationSelect');
        const windSelect = document.getElementById('windSelect');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatLog = document.getElementById('chatLog');
        const wand = document.getElementById('wand');

        const adjectives = ["귀여운", "멋진", "행복한", "졸린", "씩씩한", "신비한", "엉뚱한", "다정한", "배고픈", "배부른", "깜찍한", "맹한", "노래하는", "신비한"];
        const nouns = ["강아지", "고양이", "거북이", "토끼", "다람쥐", "너구리", "펭귄", "참새", "자라", "카멜레온", "병아리", "햄스터", "기니피그"];
        const myNickname = adjectives[Math.floor(Math.random() * adjectives.length)] + " " + nouns[Math.floor(Math.random() * nouns.length)];

        locationSelect.addEventListener('change', (e) => { gameArea.className = e.target.value; });
        const windSettings = {
            clear:   { x: 0,   y: '-350px', time: 5.0 },    
            breeze:  { x: 80,  y: '-300px', time: 4.0 },    
            cool:    { x: 150, y: '-400px', time: 1.8 },  
            typhoon: { x: 500, y: '-500px', time: 0.6 }   
        };
        let currentWind = windSettings.clear;
        windSelect.addEventListener('change', (e) => { currentWind = windSettings[e.target.value]; });

        function getParticleI_Ga(name) {
            const lastChar = name.charCodeAt(name.length - 1);
            if (lastChar < 0xAC00 || lastChar > 0xD7A3) return "가";
            return (lastChar - 0xAC00) % 28 > 0 ? "이" : "가";
        }

        function getParticleEun_Neun(name) {
            const lastChar = name.charCodeAt(name.length - 1);
            if (lastChar < 0xAC00 || lastChar > 0xD7A3) return "는";
            return (lastChar - 0xAC00) % 28 > 0 ? "은" : "는";
        }

        function showNotice(text) {
            const banner = document.createElement('div');
            banner.classList.add('notice-banner');
            banner.innerHTML = `<span class="notice-icon">📢🫧</span> <span class="notice-text">${text}</span>`;
            banner.style.animation = `fadeOutAlert ${currentWind.time}s ease-in forwards`;
            gameArea.appendChild(banner);
            setTimeout(() => { banner.remove(); }, currentWind.time * 1000);

            const logItem = document.createElement('div');
            logItem.classList.add('log-item', 'log-notice');
            logItem.innerHTML = `<span class="notice-icon">📢🫧</span> <span class="notice-text">${text}</span>`;
            chatLog.appendChild(logItem);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        socket.emit('user connect notification', myNickname);
        showNotice(`나는(${myNickname})!`);

        socket.on('user joined', (nickname) => {
            showNotice(`${nickname}${getParticleI_Ga(nickname)} 비눗방울을 불러 왔어요!`);
        });

        socket.on('user left', (nickname) => {
            showNotice(`${nickname}${getParticleEun_Neun(nickname)} 이제 집에 간대요.`);
        });

        const badWords = ["씨발", "시발", "ㅆㅂ", "ㅅㅂ", "개새끼", "개새", "ㄱㅅㄲ", "개자식", "병신", "ㅂㅅ", "등신", "쪼다", "찐따", "미친", "지랄", "ㅈㄹ", "좆", "ㅈㄴ", "존나", "닥쳐", "새끼", "관종"]; 
        function filterProfanity(text) {
            let filteredText = text;
            badWords.forEach(word => {
                const replacement = "🔲".repeat(word.length); 
                filteredText = filteredText.replace(new RegExp(word, "g"), replacement);
            });
            return filteredText;
        }

        let chatTimestamps = [];
        let isChatBanned = false;

        function checkSpam() {
            const now = Date.now();
            chatTimestamps.push(now);
            if (chatTimestamps.length > 7) chatTimestamps.shift(); 
            if (chatTimestamps.length === 7 && (now - chatTimestamps[0] < 10000)) return true;
            return false;
        }

        function appendToChatLog(nickname, messageText) {
            const logItem = document.createElement('div');
            logItem.classList.add('log-item');
            logItem.innerHTML = `<span class="log-nickname">[${nickname}]</span> ${messageText}`;
            chatLog.appendChild(logItem);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function createChatBubble(nickname, messageText) {
            const messageLength = messageText.length + nickname.length;
            const chatBubble = document.createElement('div');
            chatBubble.classList.add('bubble');
            
            // 🌟 생성 위치: 채팅창 '바로 위쪽' 에서 스폰
            chatBubble.style.left = (Math.random() * 80 + 10) + '%';
            chatBubble.style.bottom = '210px'; // 채팅창 바로 위쪽 픽셀!
            chatBubble.style.top = 'auto'; // 확실히 bottom 기준으로 올라가게 세팅
            
            const calculatedSize = 80 + (messageLength * 6); 
            chatBubble.style.width = calculatedSize + 'px';
            chatBubble.style.height = calculatedSize + 'px';

            const nicknameSpan = document.createElement('span');
            nicknameSpan.classList.add('bubble-nickname');
            nicknameSpan.innerText = `[${nickname}]`;
            chatBubble.appendChild(nicknameSpan);

            const textSpan = document.createElement('span');
            textSpan.classList.add('bubble-text');
            textSpan.innerText = messageText;
            chatBubble.appendChild(textSpan);

            chatBubble.style.setProperty('--target-x', currentWind.x + 'px');
            chatBubble.style.setProperty('--target-y', currentWind.y);
            
            // 🌟 수명 연장: 위쪽에서 시작하므로 애니메이션 시간을 1.5배 늘려 더 천천히 날아가게!
            const longerTime = currentWind.time * 1.5;
            chatBubble.style.animation = `blowAway ${longerTime}s linear forwards`; 

            gameArea.appendChild(chatBubble);

            setTimeout(() => { chatBubble.remove(); }, longerTime * 1000);
        }

        // 🌟 전송 기능을 묶어둔 전용 함수 (엔터, 버튼 클릭 모두 대응)
        function sendMessage() {
            if (isChatBanned || chatInput.value.trim() === '') return; 

            if (checkSpam()) {
                isChatBanned = true;
                chatInput.disabled = true; 
                sendBtn.disabled = true;
                chatInput.placeholder = "도배 금지! 20초 쿨타임.";
                chatInput.value = '';
                setTimeout(() => {
                    isChatBanned = false;
                    chatInput.disabled = false;
                    sendBtn.disabled = false;
                    chatInput.placeholder = "최대 20자 입력가능!";
                    chatTimestamps = []; 
                    chatInput.focus();
                }, 20000);
                return; 
            }

            const rawMessage = chatInput.value;
            const filteredMessage = filterProfanity(rawMessage);
            
            socket.emit('chat message', {
                nickname: myNickname,
                message: filteredMessage
            });

            createChatBubble(myNickname, filteredMessage);
            appendToChatLog(myNickname, filteredMessage);
            
            chatInput.value = '';
            chatInput.focus();
        }

        // 🌟 엔터키 처리
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // 🌟 버튼 클릭 처리
        sendBtn.addEventListener('click', sendMessage);

        socket.on('chat message', (data) => {
            createChatBubble(data.nickname, data.message);
            appendToChatLog(data.nickname, data.message);
        });

        let isBlowing = false, currentBubble = null, bubbleSize = 20, growInterval = null;
        gameArea.addEventListener('mousedown', (e) => {
            // UI를 누를 때는 비눗방울 스폰 방지
            if(e.target === locationSelect || e.target === windSelect || e.target === chatInput || e.target === sendBtn || chatLog.contains(e.target)) return;
            
            isBlowing = true; bubbleSize = 20;
            wand.style.display = 'block'; wand.style.left = e.clientX + 'px'; wand.style.top = e.clientY + 'px';
            currentBubble = document.createElement('div'); currentBubble.classList.add('bubble');
            currentBubble.style.left = e.clientX + 'px'; currentBubble.style.top = e.clientY + 'px';
            currentBubble.style.bottom = 'auto'; // 마우스 클릭시엔 top 기준으로 생성
            currentBubble.style.animation = 'none'; gameArea.appendChild(currentBubble);
            
            growInterval = setInterval(() => {
                if (bubbleSize < 600) { bubbleSize += 5; currentBubble.style.width = bubbleSize + 'px'; currentBubble.style.height = bubbleSize + 'px'; }
            }, 30);
        });

        window.addEventListener('mouseup', () => {
            if (!isBlowing) return;
            isBlowing = false; clearInterval(growInterval); wand.style.display = 'none';
            if (currentBubble) {
                currentBubble.style.setProperty('--target-x', currentWind.x + 'px');
                currentBubble.style.setProperty('--target-y', currentWind.y);
                const longerTime = currentWind.time * 1.5;
                currentBubble.style.animation = `blowAway ${longerTime}s linear forwards`;
                const tempBubble = currentBubble;
                setTimeout(() => { tempBubble.remove(); }, longerTime * 1000); currentBubble = null;
            }
        });
        
        gameArea.addEventListener('touchstart', (e) => {
            if(e.target === locationSelect || e.target === windSelect || e.target === chatInput || e.target === sendBtn || chatLog.contains(e.target)) return;
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousedown', { clientX: touch.clientX, clientY: touch.clientY });
            gameArea.dispatchEvent(mouseEvent);
        });
        window.addEventListener('touchend', () => { window.dispatchEvent(new Event('mouseup')); });
    </script>
</body>
</html>
