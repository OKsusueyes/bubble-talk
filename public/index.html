<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비눗방울 톡!🫧</title>

    <meta property="og:title" content="온라인 비눗방울 톡!🫧">
    <meta property="og:description" content="나만의 픽셀 비눗방울을 불고 다녀간 흔적을 남겨보세요!">
    
    <meta property="og:image" content="https://https://bubble-talk.onrender.com//썸네일.png"> 
    <style>
        /* ... (위에는 홈페이지 전송 썸네일 제작용, 아래부터는 기존 홈페이지 스타일 코드 시작) ... */
    <style>
        @font-face {
            font-family: 'DungGeunMo';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --bubble-polygon: polygon(
                31.25% 0%, 68.75% 0%, 68.75% 6.25%, 81.25% 6.25%, 81.25% 18.75%, 93.75% 18.75%, 
                93.75% 31.25%, 100% 31.25%, 100% 68.75%, 93.75% 68.75%, 93.75% 81.25%, 
                81.25% 81.25%, 81.25% 93.75%, 68.75% 93.75%, 68.75% 100%, 31.25% 100%, 
                31.25% 93.75%, 18.75% 93.75%, 18.75% 81.25%, 6.25% 81.25%, 6.25% 68.75%, 
                0% 68.75%, 0% 31.25%, 6.25% 31.25%, 6.25% 18.75%, 18.75% 18.75%, 
                18.75% 6.25%, 31.25% 6.25%
            );
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            font-family: 'DungGeunMo', sans-serif; 
            background-size: cover; background-position: center; background-repeat: no-repeat;
            background-color: #000; 
            transition: background-image 0.8s ease-in-out; 
        }
        
        .bg-playground { background-image: url('놀이터.png'); }
        .bg-rooftop { background-image: url('옥상.png'); }
        .bg-school { background-image: url('학교.png'); }
        .bg-park { background-image: url('공원.png'); }
        .bg-night { background-image: url('밤 시골길.png'); color: white; }

        .ui-container { position: absolute; top: 20px; left: 20px; z-index: 10; display: flex; flex-direction: column; gap: 8px; }
        .select-group { display: flex; gap: 10px; }
        select { 
            padding: 8px; font-size: 1rem; font-family: 'DungGeunMo', sans-serif;
            border: 3px solid #000; border-radius: 0; outline: none; 
            background: #fff; box-shadow: 4px 4px 0px rgba(0,0,0,0.3); cursor: pointer;
        }

        .update-notice {
            display: block; font-size: 0.85rem; color: #000; background: #fff; border: 2px solid #000;
            padding: 6px 10px; width: max-content; box-shadow: 4px 4px 0px rgba(0,0,0,0.3);
            text-decoration: none; font-weight: normal; cursor: pointer; margin-top: 2px;
        }
        .update-notice:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px rgba(0,0,0,0.3); }

        .board-toggle-btn {
            display: block; font-size: 0.85rem; color: #000; background: #fff; border: 2px solid #000;
            padding: 6px 10px; width: max-content; box-shadow: 4px 4px 0px rgba(0,0,0,0.3);
            font-weight: normal; cursor: pointer; margin-top: 2px;
            font-family: 'DungGeunMo', sans-serif; 
        }
        .board-toggle-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px rgba(0,0,0,0.3); }

        @keyframes smoothAppear {
            from { opacity: 0; transform: translate(-50%, -48%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }

        .board-popup {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 340px; height: 380px; background: #ffffff; border: 3px solid #000;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.3); z-index: 100; padding: 15px; box-sizing: border-box;
            flex-direction: column; gap: 10px;
        }
        .donate-popup { animation: smoothAppear 0.4s ease-out forwards; }

        .board-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; padding-bottom: 5px; }
        
        .board-title { font-size: 1.1rem; font-weight: normal; color: #000; font-family: 'DungGeunMo', sans-serif; }
        .board-close { background: none; border: none; font-size: 1.1rem; cursor: pointer; font-family: 'DungGeunMo', sans-serif; color: #000; }
        
        .board-write-area { display: flex; gap: 5px; }
        .board-input { flex: 1; border: 2px solid #000; padding: 8px; font-family: 'DungGeunMo', sans-serif; font-size: 0.85rem; outline: none; box-sizing: border-box; border-radius: 0; }
        .board-submit { border: 2px solid #000; background: #ffffff; padding: 6px 10px; font-family: 'DungGeunMo', sans-serif; font-size: 0.85rem; cursor: pointer; box-shadow: 2px 2px 0px #000; color: #000; border-radius: 0; }
        .board-submit:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0px #000; }
        
        .board-list { flex: 1; border: 2px solid #000; background: #fafafa; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
        
        .board-item { font-size: 0.8rem; border-bottom: 1px dashed #ccc; padding-bottom: 5px; word-break: break-all; color: #333; font-family: 'DungGeunMo', sans-serif; }
        .board-item-nick { font-weight: normal; color: #000; }

        .chat-log { 
            box-sizing: border-box;
            position: absolute; bottom: 75px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 350px; height: 130px; 
            background: rgba(255, 255, 255, 0.4); 
            border: 3px solid #000; border-radius: 0; box-shadow: 4px 4px 0px rgba(0,0,0,0.3);
            padding: 8px 10px; overflow-y: auto; z-index: 5; 
            display: flex; flex-direction: column; gap: 5px; 
        }
        
        .log-item { font-size: 0.8rem; color: #000; word-break: break-all; text-shadow: none; }
        .log-nickname { font-weight: normal; color: #000; background: #ffffff; border: 1px solid #000; padding: 2px 4px; margin-right: 5px; }
        
        .log-notice { color: #555; font-size: 0.75rem; background: rgba(238, 238, 238, 0.7); border: 1px dashed #aaa; padding: 3px; }
        .notice-icon { font-style: normal; }
        .notice-text { font-style: italic; }

        .notice-banner {
            position: absolute; top: 150px; left: 50%; transform: translateX(-50%);
            color: #fff; background: #000; border: 3px solid #fff; box-shadow: 4px 4px 0px rgba(0,0,0,0.3);
            padding: 5px 15px; font-size: 1rem; z-index: 30; pointer-events: none; width: max-content; text-align: center;
        }

        .chat-container { 
            box-sizing: border-box;
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 350px; z-index: 10; 
        }
        
        .input-wrapper {
            display: flex; align-items: center; background: #fff;
            border: 3px solid #000; box-shadow: 4px 4px 0px rgba(0,0,0,0.3);
        }
        
        input[type="text"] { 
            flex: 1; box-sizing: border-box; padding: 10px 15px; font-size: 0.85rem; 
            font-family: 'DungGeunMo', sans-serif; border: none; outline: none; background: transparent;
        }
        input[type="text"]:disabled { background-color: #ddd; color: #f00; }

        .divider { width: 2px; height: 20px; background-color: #aaa; margin: 0 5px; }

        #sendBtn {
            font-family: 'DungGeunMo', sans-serif; font-size: 0.85rem; font-weight: normal;
            background: transparent; border: none; padding: 10px 15px 10px 5px; 
            cursor: pointer; outline: none; color: #000;
        }
        #sendBtn:active { transform: translateY(2px); }
        
        #wand-container { 
            position: absolute; width: 40px; height: 80px; 
            transform: translate(-50%, -20px); 
            display: none; pointer-events: none; z-index: 5; 
        }
        #wand-ring {
            position: absolute; top: 0; left: 0; width: 40px; height: 40px; 
            background-color: #63B8FF; 
        }
        #wand-stick {
            position: absolute; top: 38px; left: 50%; transform: translateX(-50%);
            width: 6px; height: 40px; background-color: #63B8FF; border: none;
        }
        
        .bubble { 
            position: absolute; 
            background: conic-gradient(from 0deg, #ffb3ba, #e0c3fc, #bae1ff, #baffc9, #ffdfba, #ffb3ba);
            clip-path: var(--bubble-polygon);
            transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; 
        }

        .bubble::before {
            content: ''; position: absolute;
            top: 6px; left: 6px; right: 6px; bottom: 6px; 
            background-color: #ffffff; 
            clip-path: var(--bubble-polygon); 
            z-index: 0; 
        }
        
        .bubble-nickname { font-size: 0.8rem; color: #000; margin-bottom: 2px; background: #ffffff; padding: 3px 4px; border: 1px solid rgba(100, 180, 230, 0.8); font-weight: normal; position: relative; z-index: 1; }
        .bubble-text { color: #000; font-size: 1rem; text-align: center; padding: 0 10px; word-break: break-all; text-shadow: none; font-weight: normal; position: relative; z-index: 1; }
        
        @keyframes blowAway {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            85% { transform: translate(calc(-50% + var(--target-x) * 0.85), calc(-50% + var(--target-y) * 0.85)) scale(1.1); opacity: 1; }
            95% { transform: translate(calc(-50% + var(--target-x)), calc(-50% + var(--target-y))) scale(1.1); opacity: 0.5; }
            100% { transform: translate(calc(-50% + var(--target-x)), calc(-50% + var(--target-y))) scale(1.5); opacity: 0; }
        }

        @keyframes fadeOutAlert {
            0% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -30px); }
        }

        @media (min-width: 769px) {
            .chat-log, .chat-container { max-width: 500px; }
        }

        @media (max-width: 768px) {
            select { font-size: 0.85rem; padding: 6px; }
            .update-notice, .board-toggle-btn { font-size: 0.75rem; padding: 5px 8px; }
            .chat-log { height: 110px; bottom: 100px; padding: 6px 8px; }
            .chat-container { bottom: 30px; }
            .log-item { font-size: 0.75rem; }
            .log-notice { font-style: normal; font-size: 0.7rem; }
            input[type="text"] { font-size: 0.8rem; padding: 8px 12px; }
            #sendBtn { font-size: 0.8rem; padding: 8px 12px 8px 5px; }
            .bubble-nickname { font-size: 0.7rem; }
            .bubble-text { font-size: 0.9rem; }
        }
    </style>
</head>
<body class="bg-playground" id="gameArea">

    <div id="wand-container">
        <div id="wand-ring"></div>
        <div id="wand-stick"></div>
    </div>

    <div class="ui-container">
        <div class="select-group">
            <select id="locationSelect">
                <option value="bg-playground">놀이터</option>
                <option value="bg-rooftop">옥상</option>
                <option value="bg-school">학교</option>
                <option value="bg-park">공원</option>
                <option value="bg-night">밤 시골길</option>
            </select>
            <select id="windSelect">
                <option value="clear">맑음</option>
                <option value="breeze">산들바람</option>
                <option value="cool">시원함</option>
                <option value="typhoon">태풍</option>
            </select>
        </div>
        
        <button id="noticeToggleBtn" class="board-toggle-btn">📢Notice</button>
        <a href="https://app.notion.com/p/380e249edb9380e3bb2bde997219b8ae?source=copy_link" target="_blank" class="update-notice">💡Update Notes</a>
        <button id="boardToggleBtn" class="board-toggle-btn">📝발자국 남기기</button>
        <button id="donateToggleBtn" class="board-toggle-btn" style="text-align: center;">🍀🍀🍀</button>
    </div>

    <div id="noticePopup" class="board-popup donate-popup" style="height: auto; max-height: 400px;">
        <div class="board-header">
            <span class="board-title">📢 주인장 공지사항</span>
            <button id="noticeCloseBtn" class="board-close">X</button>
        </div>
        <div id="noticeContent" style="padding: 8px; font-family: 'DungGeunMo', sans-serif; font-size: 0.85rem; line-height: 1.5; white-space: pre-wrap; flex: 1; overflow-y: auto; color: #333; border: 2px solid #000; background: #fafafa; margin-bottom: 5px;">
            공지사항을 불러오는 중...
        </div>
        <button id="noticeEditBtn" class="board-submit" style="align-self: flex-end; font-size: 0.75rem; padding: 4px 8px;">✏️ 수정 (주인장 전용)</button>
    </div>

    <div id="boardPopup" class="board-popup">
        <div class="board-header">
            <span class="board-title">🫧다녀간 흔적을 남겨요 </span>
            <button id="boardCloseBtn" class="board-close">X</button>
        </div>
        <div class="board-write-area">
            <input type="text" id="boardInput" class="board-input" placeholder="어떻게 남기시겠어요?" maxlength="30">
            <button id="boardSubmitBtn" class="board-submit">작성</button>
        </div>
        <div id="boardList" class="board-list"></div>
    </div>
    
    <div id="donatePopup" class="board-popup donate-popup" style="height: auto; max-width: 300px;">
        <div class="board-header">
            <span class="board-title">🍀 마음 전하기</span>
            <button id="donateCloseBtn" class="board-close">X</button>
        </div>
        <div style="display: flex; justify-content: center; align-items: center; padding: 10px 0;">
            <img src="후원 QR.jpg" alt="후원 QR코드" style="max-width: 100%; height: auto; border: 2px solid #000; box-shadow: 4px 4px 0px rgba(0,0,0,0.3);">
        </div>
    </div>

    <div id="chatLog" class="chat-log"></div>

    <div class="chat-container">
        <div class="input-wrapper">
            <input type="text" id="chatInput" maxlength="20" placeholder="최대 20자 입력가능!" autocomplete="off">
            <div class="divider"></div>
            <button id="sendBtn">후~🫧</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    
    <script>
        const socket = io();

        const gameArea = document.getElementById('gameArea');
        const locationSelect = document.getElementById('locationSelect');
        const windSelect = document.getElementById('windSelect');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatLog = document.getElementById('chatLog');
        
        const wandContainer = document.getElementById('wand-container');
        const wandRing = document.getElementById('wand-ring');

        const boardToggleBtn = document.getElementById('boardToggleBtn');
        const boardPopup = document.getElementById('boardPopup');
        const boardCloseBtn = document.getElementById('boardCloseBtn');
        const boardInput = document.getElementById('boardInput');
        const boardSubmitBtn = document.getElementById('boardSubmitBtn');
        const boardList = document.getElementById('boardList');

        const donateToggleBtn = document.getElementById('donateToggleBtn');
        const donatePopup = document.getElementById('donatePopup');
        const donateCloseBtn = document.getElementById('donateCloseBtn');

        // 🌟 공지사항 관련 JS 요소 가져오기
        const noticeToggleBtn = document.getElementById('noticeToggleBtn');
        const noticePopup = document.getElementById('noticePopup');
        const noticeCloseBtn = document.getElementById('noticeCloseBtn');
        const noticeContent = document.getElementById('noticeContent');
        const noticeEditBtn = document.getElementById('noticeEditBtn');

        const adjectives = ["귀여운", "멋진", "행복한", "졸린", "씩씩한", "신비한", "엉뚱한", "다정한", "배고픈", "배부른", "깜찍한", "맹한", "노래하는", "신비한"];
        const nouns = ["강아지", "고양이", "거북이", "토끼", "다람쥐", "너구리", "펭귄", "참새", "자라", "카멜레온", "병아리", "햄스터", "기니피그"];
        const myNickname = adjectives[Math.floor(Math.random() * adjectives.length)] + " " + nouns[Math.floor(Math.random() * nouns.length)];

        function getPixelCirclePolygon(steps) {
            const r = Math.max(1, Math.floor(steps / 2));
            const points = [];
            const add = (x, y) => points.push(`${(50 + (x/r)*50).toFixed(2)}% ${(50 + (y/r)*50).toFixed(2)}%`);
            let w = [];
            for(let y = 0; y <= r; y++) { w[y] = Math.round(Math.sqrt(r*r - y*y)); }
            for(let y = r; y >= 1; y--) { add(w[y], -y); add(w[y-1], -y); }
            for(let y = 0; y <= r-1; y++) { add(w[y], y+1); add(w[y+1], y+1); }
            for(let y = r; y >= 1; y--) { add(-w[y-1], y); add(-w[y-1], y-1); }
            for(let y = 0; y <= r-1; y++) { add(-w[y], -(y+1)); add(-w[y+1], -(y+1)); }
            return `polygon(${points.join(', ')})`;
        }

        function getPixelDonutPolygon(steps, thicknessRatio) {
            const r = Math.max(1, Math.floor(steps / 2));
            const outer = []; const inner = [];
            const addOuter = (x, y) => outer.push(`${(50 + (x/r)*50).toFixed(2)}% ${(50 + (y/r)*50).toFixed(2)}%`);
            let w = []; for(let y = 0; y <= r; y++) { w[y] = Math.round(Math.sqrt(r*r - y*y)); }
            for(let y = r; y >= 1; y--) { addOuter(w[y], -y); addOuter(w[y-1], -y); }
            for(let y = 0; y <= r-1; y++) { addOuter(w[y], y+1); addOuter(w[y+1], y+1); }
            for(let y = r; y >= 1; y--) { addOuter(-w[y-1], y); addOuter(-w[y-1], y-1); }
            for(let y = 0; y <= r-1; y++) { addOuter(-w[y], -(y+1)); addOuter(-w[y+1], -(y+1)); }
            
            const ir = Math.max(1, r - thicknessRatio);
            let iw = []; for(let y = 0; y <= ir; y++) { iw[y] = Math.round(Math.sqrt(ir*ir - y*y)); }
            const addInner = (x, y) => inner.push(`${(50 + (x/r)*50).toFixed(2)}% ${(50 + (y/r)*50).toFixed(2)}%`);
            for(let y = ir-1; y >= 0; y--) { addInner(-iw[y+1], -(y+1)); addInner(-iw[y], -(y+1)); }
            for(let y = 1; y <= ir; y++) { addInner(-iw[y-1], y-1); addInner(-iw[y-1], y); }
            for(let y = ir-1; y >= 0; y--) { addInner(iw[y+1], y+1); addInner(iw[y], y+1); }
            for(let y = 1; y <= ir; y++) { addInner(iw[y-1], -y); addInner(iw[y], -y); }
            return `polygon(${outer.join(', ')}, ${inner[0]}, ${inner.join(', ')}, ${inner[inner.length-1]}, ${outer[0]})`;
        }

        wandRing.style.clipPath = getPixelDonutPolygon(16, 3);

        locationSelect.addEventListener('change', (e) => { gameArea.className = e.target.value; });
        const windSettings = { clear: { x: 0, y: '-350px', time: 5.0 }, breeze: { x: 80, y: '-300px', time: 4.0 }, cool: { x: 150, y: '-400px', time: 1.8 }, typhoon: { x: 500, y: '-500px', time: 0.6 } };
        let currentWind = windSettings.clear;
        windSelect.addEventListener('change', (e) => { currentWind = windSettings[e.target.value]; });

        boardToggleBtn.addEventListener('click', () => { boardPopup.style.display = 'flex'; });
        boardCloseBtn.addEventListener('click', () => { boardPopup.style.display = 'none'; });

        donateToggleBtn.addEventListener('click', () => { donatePopup.style.display = 'flex'; });
        donateCloseBtn.addEventListener('click', () => { donatePopup.style.display = 'none'; });

        // 🌟 공지사항 열기/닫기 로직
        noticeToggleBtn.addEventListener('click', () => { noticePopup.style.display = 'flex'; });
        noticeCloseBtn.addEventListener('click', () => { noticePopup.style.display = 'none'; });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                boardPopup.style.display = 'none';
                donatePopup.style.display = 'none';
                noticePopup.style.display = 'none'; // ESC 누르면 공지도 닫힘
            }
        });

        // 🌟 서버에서 공지사항 내용 받아오기
        socket.on('load notice', (noticeText) => {
            let container = document.getElementById('noticeContent');
            // 만약 현재 수정 중(textarea)이었다면 다시 일반 글씨(div)로 되돌림
            if (container.tagName === 'TEXTAREA') {
                container.outerHTML = `<div id="noticeContent" style="padding: 8px; font-family: 'DungGeunMo', sans-serif; font-size: 0.85rem; line-height: 1.5; white-space: pre-wrap; flex: 1; overflow-y: auto; color: #333; border: 2px solid #000; background: #fafafa; margin-bottom: 5px;"></div>`;
                noticeEditBtn.innerText = "✏️ 수정 (주인장 전용)";
            }
            document.getElementById('noticeContent').innerText = noticeText;
        });

        // 🌟 비밀번호 틀렸을 때 알림
        socket.on('notice error', () => {
            alert("비밀번호가 틀렸습니다! 주인장이 아니신가요? 👀");
        });

        // 🌟 주인장 수정 버튼 기능 로직
        let adminPwdTemp = "";
        noticeEditBtn.addEventListener('click', () => {
            const container = document.getElementById('noticeContent');
            
            if (container.tagName === 'DIV') {
                // 수정 모드 진입
                const pwd = prompt("주인장 비밀번호를 입력하세요:");
                if (pwd) {
                    adminPwdTemp = pwd; // 임시로 비밀번호 저장
                    const currentText = container.innerText;
                    // 입력 가능한 텍스트 박스로 교체
                    container.outerHTML = `<textarea id="noticeContent" class="board-input" style="flex: 1; resize: none; margin-bottom: 5px; height: 150px;">${currentText}</textarea>`;
                    noticeEditBtn.innerText = "💾 저장하기";
                }
            } else {
                // 저장 요청
                const newText = container.value;
                socket.emit('update notice', { password: adminPwdTemp, notice: newText });
            }
        });

        boardSubmitBtn.addEventListener('click', () => {
            const text = boardInput.value.trim();
            if(text === '') return;
            socket.emit('save board message', { nickname: myNickname, message: text });
            boardInput.value = '';
        });

        socket.on('load board', (messages) => {
            boardList.innerHTML = ''; 
            messages.forEach(data => {
                const item = document.createElement('div');
                item.classList.add('board-item');
                item.innerHTML = `<span class="board-item-nick">[${data.nickname}]</span> ${data.message}`;
                boardList.appendChild(item);
            });
        });

        function showNotice(text) {
            const banner = document.createElement('div');
            banner.classList.add('notice-banner');
            banner.innerHTML = `<span class="notice-icon">📢🫧</span> <span class="notice-text">${text}</span>`;
            banner.style.animation = `fadeOutAlert ${currentWind.time}s ease-in forwards`;
            gameArea.appendChild(banner);
            setTimeout(() => { banner.remove(); }, currentWind.time * 1000);

            const logItem = document.createElement('div');
            logItem.classList.add('log-item', 'log-notice');
            logItem.innerHTML = `<span class="notice-icon">📢🫧</span> <span class="notice-text">${text}</span>`;
            chatLog.appendChild(logItem);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        socket.emit('user connect notification', myNickname);
        showNotice(`나는(${myNickname})!`);

        socket.on('user joined', (nickname) => { showNotice(`${nickname}이(가) 불러왔어요!`); });
        socket.on('user left', (nickname) => { showNotice(`${nickname}은(는) 이제 집에 간대요.`); });

        const badWords = ["씨발", "시발", "ㅆㅂ", "ㅅㅂ", "개새끼", "개새", "ㄱㅅㄲ", "개자식", "병신", "ㅂㅅ", "등신", "쪼다", "찐따", "미친", "지랄", "ㅈㄹ", "좆", "ㅈㄴ", "존나", "닥쳐", "새끼", "관종"]; 
        function filterProfanity(text) {
            let filteredText = text;
            badWords.forEach(word => {
                const replacement = "🔲".repeat(word.length); 
                filteredText = filteredText.replace(new RegExp(word, "g"), replacement);
            });
            return filteredText;
        }

        let chatTimestamps = [];
        let isChatBanned = false;
        function checkSpam() {
            const now = Date.now();
            chatTimestamps.push(now);
            if (chatTimestamps.length > 7) chatTimestamps.shift(); 
            if (chatTimestamps.length === 7 && (now - chatTimestamps[0] < 10000)) return true;
            return false;
        }

        function appendToChatLog(nickname, messageText) {
            const logItem = document.createElement('div');
            logItem.classList.add('log-item');
            logItem.innerHTML = `<span class="log-nickname">[${nickname}]</span> ${messageText}`;
            chatLog.appendChild(logItem);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function createChatBubble(nickname, messageText) {
            const messageLength = messageText.length + nickname.length;
            const chatBubble = document.createElement('div');
            chatBubble.classList.add('bubble');
            
            const isMobile = window.innerWidth <= 768;
            chatBubble.style.left = (Math.random() * 80 + 10) + '%';
            chatBubble.style.bottom = isMobile ? '270px' : '220px'; 
            chatBubble.style.top = 'auto'; 
            
            const calculatedSize = 80 + (messageLength * 6); 
            chatBubble.style.width = calculatedSize + 'px';
            chatBubble.style.height = calculatedSize + 'px';

            let steps = Math.floor(calculatedSize / 6);
            if (steps % 2 !== 0) steps++;
            const dynamicPolygon = getPixelCirclePolygon(steps);
            chatBubble.style.clipPath = dynamicPolygon;

            const styleId = 'style-' + Math.random().toString(36).substr(2, 9);
            chatBubble.id = styleId;
            const styleElem = document.createElement('style');
            styleElem.innerHTML = `#${styleId}::before { clip-path: ${dynamicPolygon}; }`;
            document.head.appendChild(styleElem);

            const nicknameSpan = document.createElement('span');
            nicknameSpan.classList.add('bubble-nickname');
            nicknameSpan.innerText = `[${nickname}]`;
            chatBubble.appendChild(nicknameSpan);

            const textSpan = document.createElement('span');
            textSpan.classList.add('bubble-text');
            textSpan.innerText = messageText;
            chatBubble.appendChild(textSpan);

            chatBubble.style.setProperty('--target-x', currentWind.x + 'px');
            chatBubble.style.setProperty('--target-y', currentWind.y);
            
            const longerTime = currentWind.time * 1.5;
            chatBubble.style.animation = `blowAway ${longerTime}s linear forwards`; 

            gameArea.appendChild(chatBubble);
            setTimeout(() => { 
                chatBubble.remove(); 
                styleElem.remove(); 
            }, longerTime * 1000);
        }

        function sendMessage() {
            if (isChatBanned || chatInput.value.trim() === '') return; 
            if (checkSpam()) {
                isChatBanned = true; chatInput.disabled = true; sendBtn.disabled = true;
                chatInput.placeholder = "도배 금지! 20초 쿨타임."; chatInput.value = '';
                setTimeout(() => {
                    isChatBanned = false; chatInput.disabled = false; sendBtn.disabled = false;
                    chatInput.placeholder = "최대 20자 입력가능!"; chatTimestamps = []; chatInput.focus();
                }, 20000);
                return; 
            }
            const rawMessage = chatInput.value;
            const filteredMessage = filterProfanity(rawMessage);
            socket.emit('chat message', { nickname: myNickname, message: filteredMessage });
            createChatBubble(myNickname, filteredMessage);
            appendToChatLog(myNickname, filteredMessage);
            chatInput.value = ''; chatInput.focus();
        }

        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        sendBtn.addEventListener('click', sendMessage);

        socket.on('chat message', (data) => {
            createChatBubble(data.nickname, data.message);
            appendToChatLog(data.nickname, data.message);
        });

        let isBlowing = false, currentBubble = null, bubbleSize = 20, growInterval = null, currentStyleElem = null;
        
        // 🌟 클릭 무시 리스트를 변수로 깔끔하게 정리했습니다.
        gameArea.addEventListener('mousedown', (e) => {
            const ignoreElements = [locationSelect, windSelect, chatInput, sendBtn, boardToggleBtn, donateToggleBtn, noticeToggleBtn];
            if(e.target.tagName === 'A' || ignoreElements.includes(e.target) || chatLog.contains(e.target) || boardPopup.contains(e.target) || donatePopup.contains(e.target) || noticePopup.contains(e.target)) return;
            
            isBlowing = true; bubbleSize = 20;
            wandContainer.style.display = 'block'; wandContainer.style.left = e.clientX + 'px'; wandContainer.style.top = e.clientY + 'px';
            
            currentBubble = document.createElement('div'); currentBubble.classList.add('bubble');
            currentBubble.style.left = e.clientX + 'px'; currentBubble.style.top = e.clientY + 'px';
            currentBubble.style.bottom = 'auto';
            currentBubble.style.animation = 'none'; 

            const styleId = 'drag-bubble-' + Math.random().toString(36).substr(2, 9);
            currentBubble.id = styleId;
            currentStyleElem = document.createElement('style');
            document.head.appendChild(currentStyleElem);
            
            gameArea.appendChild(currentBubble);
            
            growInterval = setInterval(() => {
                if (bubbleSize < 600) { 
                    bubbleSize += 5; 
                    currentBubble.style.width = bubbleSize + 'px'; 
                    currentBubble.style.height = bubbleSize + 'px'; 
                    
                    let steps = Math.floor(bubbleSize / 6); 
                    if (steps < 16) steps = 16;
                    if (steps > 64) steps = 64; 
                    if (steps % 2 !== 0) steps++; 
                    
                    const dynamicPolygon = getPixelCirclePolygon(steps);
                    currentBubble.style.clipPath = dynamicPolygon;
                    currentStyleElem.innerHTML = `#${styleId}::before { clip-path: ${dynamicPolygon}; }`;
                }
            }, 30);
        });

        window.addEventListener('mouseup', () => {
            if (!isBlowing) return;
            isBlowing = false; clearInterval(growInterval); wandContainer.style.display = 'none';
            if (currentBubble) {
                currentBubble.style.setProperty('--target-x', currentWind.x + 'px');
                currentBubble.style.setProperty('--target-y', currentWind.y);
                const longerTime = currentWind.time * 1.5;
                currentBubble.style.animation = `blowAway ${longerTime}s linear forwards`;
                
                const tempBubble = currentBubble;
                const tempStyle = currentStyleElem;
                setTimeout(() => { 
                    tempBubble.remove(); 
                    tempStyle.remove();
                }, longerTime * 1000); 
                currentBubble = null;
                currentStyleElem = null;
            }
        });
        
        gameArea.addEventListener('touchstart', (e) => {
            const ignoreElements = [locationSelect, windSelect, chatInput, sendBtn, boardToggleBtn, donateToggleBtn, noticeToggleBtn];
            if(e.target.tagName === 'A' || ignoreElements.includes(e.target) || chatLog.contains(e.target) || boardPopup.contains(e.target) || donatePopup.contains(e.target) || noticePopup.contains(e.target)) return;
            
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousedown', { clientX: touch.clientX, clientY: touch.clientY });
            gameArea.dispatchEvent(mouseEvent);
        });
        window.addEventListener('touchend', () => { window.dispatchEvent(new Event('mouseup')); });
    </script>
</body>
</html>
